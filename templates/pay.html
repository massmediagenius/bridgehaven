{% extends "base.html" %}
{% block title %}Payment — HavenBridge{% endblock %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card card card-lg">
        <h2>Make a Donation</h2>
        <p class="subtitle">Support children in foster care directly.</p>

        <div id="pay-error" class="alert alert-error" style="display:none;"></div>
        <div id="pay-success" class="alert alert-success" style="display:none;"></div>

        <form id="donate-form" onsubmit="handleDonate(event)">
            <div class="form-group">
                <label for="amount">Donation Amount ($)</label>
                <input type="number" id="amount" class="form-input" placeholder="25" required min="1" step="0.01">
            </div>
            <div class="form-group">
                <label for="card_holder_name">Name on Card</label>
                <input type="text" id="card_holder_name" class="form-input" placeholder="John Smith" required>
            </div>
            <div class="form-group">
                <label for="card_number">Card Number</label>
                <input type="text" id="card_number" class="form-input" placeholder="1234 5678 9012 3456" required maxlength="19" oninput="formatCard(this)">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="expiration_date">Expiry</label>
                    <input type="text" id="expiration_date" class="form-input" placeholder="MM/YY" required maxlength="5" oninput="formatExpiry(this)">
                </div>
                <div class="form-group">
                    <label for="cvv">CVC</label>
                    <input type="text" id="cvv" class="form-input" placeholder="123" required maxlength="4">
                </div>
            </div>
            <div class="form-group">
                <label for="location">Location (optional)</label>
                <input type="text" id="location" class="form-input" placeholder="City, State">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="donate-btn">Donate Now</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function formatCard(el) {
    let v = el.value.replace(/\D/g, '').slice(0, 16);
    el.value = v.replace(/(.{4})/g, '$1 ').trim();
}
function formatExpiry(el) {
    let v = el.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 3) el.value = v.slice(0,2) + '/' + v.slice(2);
    else el.value = v;
}
async function handleDonate(e) {
    e.preventDefault();
    const errEl = document.getElementById('pay-error');
    const sucEl = document.getElementById('pay-success');
    const btn = document.getElementById('donate-btn');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';
    btn.textContent = 'Processing...';
    btn.disabled = true;

    const res = await fetch('/pay', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            card_number: document.getElementById('card_number').value.replace(/\s/g, ''),
            card_holder_name: document.getElementById('card_holder_name').value,
            expiration_date: document.getElementById('expiration_date').value,
            cvv: document.getElementById('cvv').value,
            amount: parseFloat(document.getElementById('amount').value),
            location: document.getElementById('location').value
        })
    });
    const data = await res.json();
    if (!res.ok) {
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        btn.textContent = 'Donate Now';
        btn.disabled = false;
        return;
    }
    sucEl.textContent = 'Thank you for your donation! Your support makes a real difference.';
    sucEl.style.display = 'block';
    btn.textContent = 'Donate Now';
    btn.disabled = false;
    document.getElementById('donate-form').reset();
}
</script>
{% endblock %}
